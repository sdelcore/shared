<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>my shared site</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 40rem; margin: 4rem auto; padding: 0 1rem; line-height: 1.5; }
  h1 { font-weight: 600; }
  #who { font-family: ui-monospace, monospace; color: #555; }
</style>
</head>
<body>
<h1>Hello from shared</h1>
<p>Signed in as <span id="who">…</span>.</p>
<p>Edit <code>index.html</code>, then run <code>shared deploy --name mysite</code>.</p>

<script src="/shared.js"></script>
<script>
  shared.identity()
    .then(function (me) {
      document.getElementById('who').textContent = me.name || me.email || 'unknown';
    })
    .catch(function (err) {
      document.getElementById('who').textContent = 'offline (' + err.message + ')';
    });
</script>
</body>
</html>
